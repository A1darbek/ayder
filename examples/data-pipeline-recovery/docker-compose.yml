services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ayder
      POSTGRES_PASSWORD: ayder
      POSTGRES_DB: data_pipeline_recovery
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ayder -d data_pipeline_recovery"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - data_pipeline_recovery_pg:/var/lib/postgresql/data

volumes:
  data_pipeline_recovery_pg:
