x-ayder-common: &ayder-common
  build: .
  image: ayder:ha
  shm_size: 2g
  ipc: shareable
  ulimits:
    memlock:
      soft: -1
      hard: -1
  security_opt:
    - seccomp:unconfined
  cap_add:
    - NET_ADMIN
    - NET_RAW
  restart: unless-stopped
  # IMPORTANT: do NOT override entrypoint; image entrypoint.sh must run
  environment: &ayder-env
    RF_HA_ENABLED: "1"
    RF_HA_NODES: "node1:10.77.0.11:7000:100,node2:10.77.0.12:8000:80,node3:10.77.0.13:9000:60,node4:10.77.0.14:10000:40,node5:10.77.0.15:11000:20"
    RF_HA_WRITE_CONCERN: "3"
    RF_BEARER_TOKENS: "dev@55555555555555:11111111111111111:111111111111111111111"
    RF_HA_TLS: "0"
    RF_HA_DEDICATED_WORKER: "0"
    # RF_RESET_DATA: "1"   # uncomment once if you want a fresh wipe on startup
  networks:
    ayder_ha:
      ipv4_address: 10.77.0.250  # overridden per node

services:
  node1:
    <<: *ayder-common
    container_name: ayder-node1
    environment:
      <<: *ayder-env
      RF_HA_NODE_ID: "node1"
      RF_HA_BOOTSTRAP_LEADER: "1"
    command: ["./ayder", "--port", "7001", "--workers", "4"]
    volumes:
      - ./cluster/node1:/data
    ports:
      - "7001:7001"
    networks:
      ayder_ha:
        ipv4_address: 10.77.0.11

  node2:
    <<: *ayder-common
    container_name: ayder-node2
    environment:
      <<: *ayder-env
      RF_HA_NODE_ID: "node2"
    command: ["./ayder", "--port", "8001", "--workers", "4"]
    volumes:
      - ./cluster/node2:/data
    ports:
      - "8001:8001"
    networks:
      ayder_ha:
        ipv4_address: 10.77.0.12

  node3:
    <<: *ayder-common
    container_name: ayder-node3
    environment:
      <<: *ayder-env
      RF_HA_NODE_ID: "node3"
    command: ["./ayder", "--port", "9001", "--workers", "4"]
    volumes:
      - ./cluster/node3:/data
    ports:
      - "9001:9001"
    networks:
      ayder_ha:
        ipv4_address: 10.77.0.13

  node4:
    <<: *ayder-common
    container_name: ayder-node4
    environment:
      <<: *ayder-env
      RF_HA_NODE_ID: "node4"
    command: ["./ayder", "--port", "10001", "--workers", "4"]
    volumes:
      - ./cluster/node4:/data
    ports:
      - "10001:10001"
    networks:
      ayder_ha:
        ipv4_address: 10.77.0.14

  node5:
    <<: *ayder-common
    container_name: ayder-node5
    environment:
      <<: *ayder-env
      RF_HA_NODE_ID: "node5"
    command: ["./ayder", "--port", "11001", "--workers", "4"]
    volumes:
      - ./cluster/node5:/data
    ports:
      - "11001:11001"
    networks:
      ayder_ha:
        ipv4_address: 10.77.0.15

networks:
  ayder_ha:
    driver: bridge
    ipam:
      config:
        - subnet: 10.77.0.0/24