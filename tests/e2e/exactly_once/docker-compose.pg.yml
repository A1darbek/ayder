services:
  postgres:
    image: postgres:16
    container_name: ayder-e2e-postgres
    environment:
      POSTGRES_USER: ayder
      POSTGRES_PASSWORD: ayder
      POSTGRES_DB: ayder_e2e
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ayder -d ayder_e2e"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - ayder_e2e_pg:/var/lib/postgresql/data

volumes:
  ayder_e2e_pg:
